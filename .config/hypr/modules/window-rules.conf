####################
### Window Rules ###
####################

windowrule {
  name = Emacs
  match:class = Emacs

  workspace = 1
}

windowrule {
  name = DEV Browser
  match:class = google-chrome

  workspace = 2
}

windowrule {
  name = Coding Agent
  match:initial_title = opencode

  workspace = 3
}

windowrule {
  name = Lazygit
  match:initial_title = lazygit

  workspace = 4
}

windowrule {
  name = LazygitFloating
  match:initial_title = lazygit-floating

  float = on
  center = on
  size = (monitor_w*0.95) (monitor_h*0.9) 
  animation = none
}

windowrule {
  name = Main Browser
  match:class = helium

  workspace = 9
  focus_on_activate = true
}

windowrule {
  name = Steam
  match:class = steam

  workspace = 10
}
